project_name: helm-charts-tui

before:
  hooks:
    - go mod tidy
    - go vet ./...

builds:
  - main: .
    binary: helm-charts-tui
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  disable: true

release:
  github:
    owner: TaliaMarine
    name: helm-charts-tui
  # release-please creates the GitHub release; goreleaser only uploads artifacts
  mode: keep-existing
